<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#C9961A;
  --dark:#080808;
  --dark2:#101010;
  --text:#F2EDD6;
}

body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif}

/* NAV */
nav{
  background:var(--dark2);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-img{
  width:45px;
}

.logo-name{
  font-family:'Bebas Neue';
  color:var(--gold);
  font-size:24px;
}

/* HERO */
.hero{
  position:relative;
  padding:60px;
  text-align:center;
}

/* BACKGROUND LOGO */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('logo.png') center no-repeat;
  background-size:400px;
  opacity:0.05;
}

/* CONTENT ABOVE */
.hero-content{
  position:relative;
  z-index:1;
}

.hero-logo{
  width:120px;
  margin-bottom:20px;
}

h1{
  font-family:'Bebas Neue';
  font-size:60px;
}

button{
  background:var(--gold);
  border:none;
  padding:12px 25px;
  margin-top:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="logo.png" class="logo-img">
    <div class="logo-name">LEON NUTRITION</div>
  </div>

  <button>BUY NOW</button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <img src="logo.png" class="hero-logo">

    <h1>KILLSET</h1>
    <p>PRE WORKOUT</p>

    <button>ORDER NOW</button>

  </div>
</section>

</body>
</html>
